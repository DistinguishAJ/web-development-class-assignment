<head>
  <title>CSS Display Property Example</title>
  <style>
    p {
      color: white;
    }

    .red {
      display: block;
      width: 200px;
      height: 200px;
      background-color: red;
    }

    .green {
      display: block;
      width: 200px;
      height: 200px;
      background-color: green;
    }

    .blue {
      display: inline-block;
      width: 200px;
      height: 200px;
      background-color: blue;
    }

    .purple {
      display: inline-block;
      width: 200px;
      height: 200px;
      background-color: purple;
    }

    .orange {
      display: inline-block;
      width: 200px;
      height: 200px;
      background-color: orange;
    }

    .hash {
      display: inline-block;
      width: 200px;
      height: 200px;
      background-color: rgb(99, 99, 99);
    }
  </style> 
</head>


<body>
  <h1>CSS Display Property</h1>
  <p class="red">Red Paragraph </p>
  <p class="green">Green Paragraph</p>
  <p class="blue">Blue Paragraph</p>

  
  <h1>CSS Display Property</h1>
  <p class="purple">Purple Paragraph </p>
  <p class="orange">Orange Paragraph</p>
  <p class="hash">Harsh Paragraph</p>
</body>

</html>
